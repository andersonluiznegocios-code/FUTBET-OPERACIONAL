<style>
  :root{
    --bg:#fff5ec;
    --bg-elev:#fff8f2;
    --bg-card:#ffffff;
    --bg-card2:#fef0e4;
    --line:#f0ddc8;
    --accent:#ff7a1a;
    --accent-dim:#cc5e0a;
    --accent-soft:rgba(255,122,26,0.10);
    --on-accent:#ffffff;
    --secondary:#1656d9;
    --secondary-soft:rgba(22,86,217,0.10);
    --win:#0e8f5b;
    --lose:#d7314c;
    --text:#1c1306;
    --muted:#7a6b58;
    --faint:#a3927c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select{font-family:inherit;background:var(--bg-card2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px 14px;font-size:15px;width:100%;outline:none;}
  input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  input::placeholder{color:var(--faint);}
  label{font-size:12.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;letter-spacing:.02em;text-transform:uppercase;}
  .field{margin-bottom:14px;}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:8px;}
  .brand-mark{width:28px;height:28px;border-radius:7px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--on-accent);font-weight:700;font-size:14px;font-family:'Space Grotesk',sans-serif;}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:.01em;}
  .saldo-chip{background:var(--bg-card2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--accent);}

  .content{flex:1;padding:18px;padding-bottom:90px;}

  /* MATCH BANNER */
  .match-banner{background:linear-gradient(160deg,var(--bg-card2) 0%, var(--bg-card) 100%);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px;position:relative;overflow:hidden;}
  .match-banner::before{content:'';position:absolute;top:-40%;right:-20%;width:160px;height:160px;background:radial-gradient(circle, var(--accent-soft), transparent 70%);}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--accent-soft);color:var(--accent);padding:4px 9px;border-radius:6px;margin-bottom:10px;}
  .teams{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .teams .vs{color:var(--faint);font-size:14px;font-weight:500;}
  .match-meta{color:var(--muted);font-size:13px;display:flex;gap:14px;flex-wrap:wrap;}
  .match-meta span{display:flex;align-items:center;gap:5px;}

  .card{background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(16,28,46,0.04);}
  .card-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .muted{color:var(--muted);}
  .small{font-size:12.5px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:11px;padding:14px 18px;font-weight:700;font-size:14.5px;width:100%;transition:transform .1s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent);color:var(--on-accent);}
  .btn-ghost{background:var(--bg-card2);color:var(--text);border:1px solid var(--line);}
  .btn-danger{background:rgba(215,49,76,0.10);color:var(--lose);border:1px solid rgba(215,49,76,0.3);}
  .btn-sm{padding:9px 12px;font-size:13px;width:auto;}

  /* AUTH */
  .auth-wrap{padding:40px 22px;}
  .auth-logo{text-align:center;margin-bottom:28px;}
  .auth-logo .mark{width:56px;height:56px;border-radius:14px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--on-accent);font-weight:700;font-size:22px;font-family:'Space Grotesk',sans-serif;margin:0 auto 12px;}
  .auth-logo h1{font-size:22px;}
  .auth-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
  .tabswitch{display:flex;background:var(--bg-card2);border-radius:11px;padding:4px;margin-bottom:22px;}
  .tabswitch button{flex:1;padding:10px;border-radius:8px;font-weight:600;font-size:13.5px;color:var(--muted);}
  .tabswitch button.active{background:var(--bg-card);color:var(--text);box-shadow:0 1px 3px rgba(16,28,46,0.08);}
  .errormsg{color:var(--lose);font-size:13px;margin-bottom:12px;background:rgba(215,49,76,0.08);border:1px solid rgba(215,49,76,0.25);border-radius:8px;padding:10px 12px;}
  .hint{background:var(--bg-card2);border:1px dashed var(--line);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--faint);margin-top:16px;line-height:1.5;}

  /* BOTTOM NAV */
  .bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:8px 6px;padding-bottom:max(8px, env(safe-area-inset-bottom));z-index:30;}
  .navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 2px;border-radius:10px;color:var(--faint);font-size:10.5px;font-weight:600;}
  .navitem.active{color:var(--accent);}
  .navicon{font-size:18px;line-height:1;}

  /* MARKETS */
  .cat-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:22px 0 10px;}
  .cat-label:first-child{margin-top:0;}
  .market{margin-bottom:10px;}
  .market-q{font-size:13.5px;font-weight:600;margin-bottom:8px;color:var(--text);}
  .opt-row{display:flex;gap:8px;flex-wrap:wrap;}
  .opt{flex:1;min-width:84px;background:var(--bg-card2);border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center;}
  .opt .lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:3px;}
  .opt .odd{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;}
  .opt.selected{background:var(--accent-soft);border-color:var(--accent);}
  .opt.selected .lbl{color:var(--text);}
  .opt.selected .odd{color:var(--accent);}

  .score-stepper{display:flex;justify-content:space-around;gap:14px;padding:6px 0 4px;}
  .score-col{text-align:center;flex:1;}
  .score-team{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:10px;}
  .score-ctrl{display:flex;align-items:center;justify-content:center;gap:12px;}
  .score-ctrl button{width:36px;height:36px;border-radius:9px;background:var(--bg-card2);border:1px solid var(--line);font-size:20px;font-weight:700;color:var(--accent);display:flex;align-items:center;justify-content:center;line-height:1;}
  .score-val{font-size:24px;font-weight:700;min-width:26px;font-family:'Space Grotesk',sans-serif;}

  .corner-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .corner-table th{color:var(--faint);font-weight:700;font-size:11px;text-transform:uppercase;padding:6px 2px;border-bottom:1px solid var(--line);text-align:center;}
  .corner-table th:first-child{text-align:left;}
  .corner-table td{padding:3px;border-bottom:1px solid var(--line);}
  .corner-table td:first-child{font-weight:600;font-size:12px;padding-left:2px;}
  .corner-cell{width:100%;padding:8px 2px;border-radius:8px;background:var(--bg-card2);border:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--text);}
  .corner-cell.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .corner-lock{display:block;text-align:center;color:var(--faint);}

  /* TICKET / SLIP */
  .slip-bar{position:fixed;bottom:64px;left:0;right:0;max-width:480px;margin:0 auto;padding:0 14px;z-index:25;}
  .slip-pill{background:var(--accent);color:var(--on-accent);border-radius:14px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 10px 24px rgba(11,95,255,0.28);font-weight:700;}
  .slip-pill .n{background:var(--on-accent);color:var(--accent);width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;margin-right:8px;}
  .sheet-overlay{position:fixed;inset:0;background:rgba(10,18,30,0.5);z-index:40;display:flex;align-items:flex-end;justify-content:center;}
  .sheet{max-width:480px;width:100%;background:var(--bg-elev);border-radius:20px 20px 0 0;padding:18px;max-height:88vh;overflow-y:auto;}
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 14px;}
  .ticket{position:relative;background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(16,28,46,0.05);}
  .ticket::after{content:'';position:absolute;left:14px;right:14px;bottom:-1px;height:10px;background-image:radial-gradient(circle at 6px 0, transparent 5px, var(--bg-card) 5.5px);background-size:12px 10px;background-repeat:repeat-x;}
  .leg{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);}
  .leg:last-child{border-bottom:none;}
  .leg .lname{font-size:12.5px;color:var(--muted);}
  .leg .lopt{font-size:13.5px;font-weight:600;}
  .leg .lodd{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:13.5px;}
  .leg .rm{color:var(--lose);font-size:11px;margin-left:8px;}
  .totals-row{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px;margin-top:6px;}
  .totals-row .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;}
  .totals-row .v{font-family:'JetBrains Mono',monospace;font-weight:700;}

  /* TABLE / LISTS */
  .list-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
  .list-row:last-child{border-bottom:none;}
  .rank-pos{width:26px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--muted);}
  .status-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
  .status-pendente{background:var(--accent-soft);color:var(--accent-dim);}
  .status-ganhou{background:rgba(14,143,91,0.12);color:var(--win);}
  .status-perdeu{background:rgba(215,49,76,0.10);color:var(--lose);}

  .empty{text-align:center;padding:40px 14px;color:var(--faint);}
  .empty .ic{font-size:32px;margin-bottom:8px;}

  table.admin-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.admin-table th{text-align:left;color:var(--faint);font-weight:600;padding:6px 4px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;}
  table.admin-table td{padding:8px 4px;border-bottom:1px solid var(--line);}
  .odd-input{width:64px;padding:6px 8px;font-size:12.5px;}

  .toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--accent);color:var(--text);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:60;box-shadow:0 6px 20px rgba(16,28,46,0.18);}
  .footer-note{text-align:center;color:var(--faint);font-size:11px;margin-top:24px;line-height:1.6;}
</style>

function factorial(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function poissonPMF(k,lambda){ return Math.exp(-lambda)*Math.pow(lambda,k)/factorial(k); }
function placarOdds(b,a,scale){
  scale = scale||1;
  const LN=1.45*scale, LF=0.80*scale; // médias calibradas com as odds reais de gols por time (Brasil x Japão)
  const p = poissonPMF(b,LN)*poissonPMF(a,LF);
  if(p<=0) return 999;
  const odd = (1/p)*0.93;
  return Math.max(1.3, Math.round(odd*100)/100);
}

}

function optionRange(key){
  if(key==null) return [0,Infinity];
  if(key.startsWith('exato_')){ const n=Number(key.split('_')[1]); return [n,n]; }
  if(key.startsWith('mais_')){ const n=Number(key.split('_')[1]); return [n+1, Infinity]; }
  if(key.startsWith('menos_')){ const n=Number(key.split('_')[1]); return [0, n-1]; }
  return null;
}
function rangesOverlap(r1,r2){ return r1 && r2 && r1[0]<=r2[1] && r2[0]<=r1[1]; }
function inRange(v,r){ return r && r[0]<=v && v<=r[1]; }
function halfWinKey(b,a,teamKey){ return b>a?teamKey:b<a?'adversario':'empate'; }
const GOAL_TRIANGLES = [
  {total:'escanteios_total', a:'escanteios_brasil', b:'escanteios_japao', label:'escanteios'},
];
function scenarioConsistent(b1,a1,b2,a2, byMarket, teamKey){
  const hf=b1+b2, af=a1+a2;
  const checks = [
    ['vencedor', halfWinKey(hf,af,teamKey)],
    ['resultado1t', halfWinKey(b1,a1,teamKey)],
    ['resultado2t', halfWinKey(b2,a2,teamKey)],
    ['ambas_marcam', (hf>0&&af>0)?'sim':'nao'],
    ['ambas_marcam_1t', (b1>0&&a1>0)?'sim':'nao'],
    ['ambas_marcam_2t', (b2>0&&a2>0)?'sim':'nao'],
  ];
  for(const [mid,val] of checks){ if(byMarket[mid] && byMarket[mid].optionKey!==val) return false; }
  if(byMarket['placar'] && byMarket['placar'].optionKey!=='outro'){
    const [pb,pa]=byMarket['placar'].optionKey.split('-').map(Number);
    if(pb!==hf || pa!==af) return false;
  }
  if(byMarket['placar1t'] && byMarket['placar1t'].optionKey!=='outro'){
    const [pb,pa]=byMarket['placar1t'].optionKey.split('-').map(Number);
    if(pb!==b1 || pa!==a1) return false;
  }
  if(byMarket['placar2t'] && byMarket['placar2t'].optionKey!=='outro'){
    const [pb,pa]=byMarket['placar2t'].optionKey.split('-').map(Number);
    if(pb!==b2 || pa!==a2) return false;
  }
  if(byMarket['chance_dupla']){
    const winner = halfWinKey(hf,af,teamKey);
    const allowed = {[teamKey]:[teamKey+'_empate',teamKey+'_japao'], empate:[teamKey+'_empate','empate_japao'], adversario:['empate_japao',teamKey+'_japao']}[winner];
    if(!allowed.includes(byMarket['chance_dupla'].optionKey)) return false;
  }
  if(byMarket['classificacao']){
    const ck = byMarket['classificacao'].optionKey;
    if(hf!==af){ if(ck !== (hf>af?'brasil_90':'adversario_90')) return false; }
    else if(ck.endsWith('_90')) return false;
  }
  if(byMarket['gols_total'] && !inRange(hf+af, optionRange(byMarket['gols_total'].optionKey))) return false;
  if(byMarket['gols_brasil'] && !inRange(hf, optionRange(byMarket['gols_brasil'].optionKey))) return false;
  if(byMarket['gols_japao'] && !inRange(af, optionRange(byMarket['gols_japao'].optionKey))) return false;
  if(byMarket['quem_marca']){
    const k = byMarket['quem_marca'].optionKey;
    if(k==='ninguem' ? hf!==0 : hf<1) return false;
  }
  if(byMarket['jogador_2mais'] && byMarket['jogador_2mais'].optionKey!=='nenhum' && hf<2) return false;
  if(byMarket['quem_marca_jpn']){
    const k = byMarket['quem_marca_jpn'].optionKey;
    if(k==='ninguem' ? af!==0 : af<1) return false;
  }
  if(byMarket['jogador_2mais_jpn'] && byMarket['jogador_2mais_jpn'].optionKey!=='nenhum' && af<2) return false;
  return true;
}
function anyScenarioFits(byMarket){
  for(let b1=0;b1<=7;b1++) for(let a1=0;a1<=7;a1++) for(let b2=0;b2<=7;b2++) for(let a2=0;a2<=7;a2++){
    if(scenarioConsistent(b1,a1,b2,a2,byMarket,'brasil')) return true;
  }
  return false;
}
function findConflict(newSel, slip){
  const all = [...slip, newSel];
  const byMarket = {}; all.forEach(s=> byMarket[s.marketId]=s);

  const GOAL_RELATED = ['vencedor','resultado1t','resultado2t','placar','placar1t','placar2t','gols_total','gols_brasil','gols_japao','ambas_marcam','ambas_marcam_1t','ambas_marcam_2t','chance_dupla','classificacao','quem_marca','jogador_2mais','quem_marca_jpn','jogador_2mais_jpn'];
  if(GOAL_RELATED.some(id=>byMarket[id]) && !anyScenarioFits(byMarket)){
    return `"${newSel.label}" (${newSel.marketLabel}) não é compatível com as outras seleções desse bilhete — não existe nenhum placar possível que satisfaça tudo ao mesmo tempo.`;
  }

  for(const tri of GOAL_TRIANGLES){
    const st = byMarket[tri.total], sa = byMarket[tri.a], sb = byMarket[tri.b];
    if(!st && !sa && !sb) continue;
    const rt = st? optionRange(st.optionKey) : [0,Infinity];
    const ra = sa? optionRange(sa.optionKey) : [0,Infinity];
    const rb = sb? optionRange(sb.optionKey) : [0,Infinity];
    const sumMin = ra[0]+rb[0];
    const sumMax = (ra[1]===Infinity||rb[1]===Infinity) ? Infinity : ra[1]+rb[1];
    if(!rangesOverlap(rt, [sumMin, sumMax])) return `Os mercados de ${tri.label} escolhidos são incompatíveis entre si`;
  }
  return null;
}

function toggleSelection(marketId,marketLabel,opt){
  const idx = state.slip.findIndex(s=>s.marketId===marketId);
  if(idx>-1){
    if(state.slip[idx].optionKey===opt.key){ state.slip.splice(idx,1); render(); return; }
    const newSel = {marketId,marketLabel,optionKey:opt.key,label:opt.label,odds:opt.odds};
    const conflict = findConflict(newSel, state.slip.filter(s=>s.marketId!==marketId));
    if(conflict){ showToast('⚠️ '+conflict); return; }
    state.slip[idx] = newSel;
    render(); return;
  }
  if(state.slip.length>=5){ showToast('Máximo de 5 seleções por bilhete'); return; }
  const newSel = {marketId,marketLabel,optionKey:opt.key,label:opt.label,odds:opt.odds};
  const conflict = findConflict(newSel, state.slip);
  if(conflict){ showToast('⚠️ '+conflict); return; }
  state.slip.push(newSel);
  render();
}

function tabbedTableWidget(opts){
  // opts: {title, dataObj, scopeMap, currentScope, setScopeFn, unitLabel}
  const marketId = opts.scopeMap[opts.currentScope];
  const data = opts.dataObj[opts.currentScope];
  const sel = state.slip.find(s=>s.marketId===marketId);
  const cell = (type, n, val) => {
    if(val==null) return `<td><span class="corner-lock">🔒</span></td>`;
    const key = type+'_'+n;
    const label = (type==='mais'?'Mais de ':type==='menos'?'Menos de ':'Exatamente ')+n;
    const isSel = sel && sel.optionKey===key;
    return `<td><button class="corner-cell ${isSel?'selected':''}" onclick='toggleSelection("${marketId}", ${JSON.stringify(opts.title+' — '+data.scopeLabel)}, ${JSON.stringify({key,label,odds:val})})'>${fmtOdd(val)}</button></td>`;
  };
  const rows = data.rows.map(r=>`<tr><td>${r.n} ${opts.unitLabel}</td>${cell('mais',r.n,r.mais)}${cell('exato',r.n,r.exato)}${cell('menos',r.n,r.menos)}</tr>`).join('');
  return `<div class="market">
    <div class="market-q">${opts.title}</div>
    <div class="tabswitch" style="margin-bottom:12px;">
      <button onclick="${opts.setScopeFn}('combinado')" class="${opts.currentScope==='combinado'?'active':''}">Combinados</button>
      <button onclick="${opts.setScopeFn}('brasil')" class="${opts.currentScope==='brasil'?'active':''}">Brasil</button>
      <button onclick="${opts.setScopeFn}('japao')" class="${opts.currentScope==='japao'?'active':''}">Japão</button>
    </div>
    <table class="corner-table">
      <thead><tr><th></th><th>Mais de</th><th>Exatamente</th><th>Menos de</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function isBettingClosed(){
  if(!state.match.kickoffAt) return false;
  const kickoff = new Date(state.match.kickoffAt);
  const cutoff = new Date(kickoff.getTime() - 5*60*1000);
  return new Date() > cutoff;
}

  state.loading = true; render();

}

function viewMyBets(){

    if(b.status==='ganhou'){

function gatherAndComputeResult(){
  const v1b=$('#r_placar1tBrasil').value, v1a=$('#r_placar1tAdv').value, v2b=$('#r_placar2tBrasil').value, v2a=$('#r_placar2tAdv').value;
  if(v1b===''||v1a===''||v2b===''||v2a===''){ showToast('Preencha o placar do 1º e do 2º tempo'); return null; }
  const p1b=Number(v1b), p1a=Number(v1a), p2b=Number(v2b), p2a=Number(v2a);
  const pb = p1b+p2b, pa = p1a+p2a;
  const decisao = $('#r_decisao').value;
  if(pb===pa && !decisao){ showToast('Empatou em 90 min — selecione como terminou (prorrogação ou pênaltis)'); return null; }
  const escBrasil1t = Number($('#r_escBrasil1t').value)||0;
  const escBrasil2t = Number($('#r_escBrasil2t').value)||0;
  const escAdv1t = Number($('#r_escAdv1t').value)||0;
  const escAdv2t = Number($('#r_escAdv2t').value)||0;
  const cartoes1t = Number($('#r_cartoes1t').value)||0;
  const cartoes2t = Number($('#r_cartoes2t').value)||0;
  const escBrasil = escBrasil1t+escBrasil2t, escAdv = escAdv1t+escAdv2t, cart = cartoes1t+cartoes2t;

  const gols = state.matchResult.gols.map((g,i)=>({
    team:g.team,
    jogador: document.getElementById('gol_jogador_'+i).value,
    minuto: document.getElementById('gol_min_'+i).value,
  }));
  state.matchResult = {placar1tBrasil:p1b,placar1tAdv:p1a,placar2tBrasil:p2b,placar2tAdv:p2a,
    escBrasil1t,escBrasil2t,escAdv1t,escAdv2t,cartoes1t,cartoes2t,decisao,gols};

  const s = {};
  s.vencedor = [pb>pa?'brasil':pb<pa?'adversario':'empate'];
  s.classificacao = [pb!==pa ? (pb>pa?'brasil_90':'adversario_90') : decisao];
  s.resultado1t = [p1b>p1a?'brasil':p1b<p1a?'adversario':'empate'];
  s.resultado2t = [p2b>p2a?'brasil':p2b<p2a?'adversario':'empate'];
  s.placar = [pb+'-'+pa];
  s.placar1t = [p1b+'-'+p1a];
  s.placar2t = [p2b+'-'+p2a];
  s.gols_total = cornerSettledKeys(pb+pa, GOALS_DATA.combinado.rows);
  s.gols_brasil = cornerSettledKeys(pb, GOALS_DATA.brasil.rows);
  s.gols_japao = cornerSettledKeys(pa, GOALS_DATA.japao.rows);
  s.ambas_marcam = [(pb>0&&pa>0)?'sim':'nao'];
  s.escanteios_total = cornerSettledKeys(escBrasil+escAdv, CORNERS_DATA.combinado.rows);
  s.escanteios_brasil = cornerSettledKeys(escBrasil, CORNERS_DATA.brasil.rows);
  s.escanteios_japao = cornerSettledKeys(escAdv, CORNERS_DATA.japao.rows);
  s.cartoes = cornerSettledKeys(cart, CARDS_DATA.rows);

  const golsBrasil10 = gols.filter(g=>g.team==='brasil' && Number(g.minuto)<=10).length;
  const golsAdv10 = gols.filter(g=>g.team==='adversario' && Number(g.minuto)<=10).length;
  s.resultado_10min = [golsBrasil10>golsAdv10?'brasil':golsBrasil10<golsAdv10?'adversario':'empate'];

  if(s.vencedor[0]==='brasil') s.chance_dupla=['brasil_empate','brasil_japao'];
  else if(s.vencedor[0]==='empate') s.chance_dupla=['brasil_empate','empate_japao'];
  else s.chance_dupla=['empate_japao','brasil_japao'];

  const brasil1t = gols.some(g=>g.team==='brasil' && Number(g.minuto)<=45);
  const adv1t = gols.some(g=>g.team==='adversario' && Number(g.minuto)<=45);
  s.ambas_marcam_1t = [(brasil1t&&adv1t)?'sim':'nao'];
  const brasil2t = gols.some(g=>g.team==='brasil' && Number(g.minuto)>45);
  const adv2t = gols.some(g=>g.team==='adversario' && Number(g.minuto)>45);
  s.ambas_marcam_2t = [(brasil2t&&adv2t)?'sim':'nao'];

  const brasilGols = gols.filter(g=>g.team==='brasil');
  const namedScorers = brasilGols.filter(g=>g.jogador && g.jogador!=='outro').map(g=>g.jogador);
  const hasOutro = brasilGols.some(g=>g.jogador==='outro');
  if(brasilGols.length===0){ s.quem_marca=['ninguem']; }
  else { s.quem_marca=[...new Set(namedScorers)]; if(hasOutro) s.quem_marca.push('outro'); if(s.quem_marca.length===0) s.quem_marca=['ninguem']; }
  const counts={};
  namedScorers.forEach(n=> counts[n]=(counts[n]||0)+1);
  const braces = Object.keys(counts).filter(n=>counts[n]>=2);
  s.jogador_2mais = braces.length ? braces : ['nenhum'];

  const advGols = gols.filter(g=>g.team==='adversario');
  const namedScorersJpn = advGols.filter(g=>g.jogador && g.jogador!=='outro').map(g=>g.jogador);
  const hasOutroJpn = advGols.some(g=>g.jogador==='outro');
  if(advGols.length===0){ s.quem_marca_jpn=['ninguem']; }
  else { s.quem_marca_jpn=[...new Set(namedScorersJpn)]; if(hasOutroJpn) s.quem_marca_jpn.push('outro'); if(s.quem_marca_jpn.length===0) s.quem_marca_jpn=['ninguem']; }
  const countsJpn={};
  namedScorersJpn.forEach(n=> countsJpn[n]=(countsJpn[n]||0)+1);
  const bracesJpn = Object.keys(countsJpn).filter(n=>countsJpn[n]>=2);
  s.jogador_2mais_jpn = bracesJpn.length ? bracesJpn : ['nenhum'];

  for(let i=0;i<5;i++){ s['g1t_'+i]=['nao']; s['g2t_'+i]=['nao']; }
  gols.forEach(g=>{
    const min = Number(g.minuto);
    if(!min) return;
    if(min<=45){ const idx = min<=10?0:min<=20?1:min<=30?2:min<=40?3:4; s['g1t_'+idx]=['sim']; }
    else { const idx = min<=55?0:min<=65?1:min<=75?2:min<=85?3:4; s['g2t_'+idx]=['sim']; }
  });

  return {pb,pa,p1b,p1a,p2b,p2a,escBrasil,escAdv,cart,escBrasil1t,escBrasil2t,escAdv1t,escAdv2t,cartoes1t,cartoes2t,gols,s};
}

function marketLabelOf(marketId){
  const m = state.markets.find(x=>x.id===marketId);
  return m ? m.label : marketId;
}
function optionLabelOf(marketId, key){
  const m = state.markets.find(x=>x.id===marketId);
  if(!m) return key;
  if(SCORE_MARKETS.includes(marketId)){ const [b,a]=key.split('-'); return 'Brasil '+b+' x '+a+' '+state.match.adversario; }
  const opt = (m.options||[]).find(o=>o.key===key);
  return opt ? opt.label : key;
}

async function bulkDeleteParticipants(){

  if(!confirm(`Excluir ${ids.length} participante(s) selecionado(s)? Isso remove os cadastros e as apostas deles. Os CPFs ficam livres pra cadastrar de novo.`)) return;
  let ok=0, falhou=0;
  for(const id of ids){
    try{
      await sbRpc('admin_excluir_participante', {p_admin_email:state.currentUser.email, p_admin_senha:state.currentUser.senha, p_participante_id:id});
      ok++;

  state.selectedDelete = [];
  showToast(`${ok} excluído(s)${falhou?` · ${falhou} falharam`:''}`);
  await loadAdminParticipantes();
  render();
}

/* ============== RENDER ============== */
function render(){
  let html='';
  if(!state.currentUser){ html = viewAuth(); }
  else {
    if(state.view==='home') html = viewHome();
    else if(state.view==='bet') html = viewBet();
    else if(state.view==='mybets') html = viewMyBets();
    else if(state.view==='ranking') html = viewRanking();
    else if(state.view==='admin') html = viewAdmin();
    else html = viewHome();
  }
  if(state.toast) html += `<div class="toast">${state.toast}</div>`;
  $('#app').innerHTML = html;
}
async function initApp(){
  try{
    const rows = await sbSelect('config_jogo','id=eq.1');
    if(rows && rows[0]){
      const c = rows[0];
      state.match.adversario = c.adversario || state.match.adversario;
      state.match.fase = c.fase || state.match.fase;
      state.match.data = c.data || state.match.data;
      state.match.hora = c.hora || state.match.hora;
      state.match.local = c.local || state.match.local;
      if(c.kickoff_at){
        const d = new Date(c.kickoff_at);
        const pad = n=>String(n).padStart(2,'0');
        state.match.kickoffAt = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }
    }
  }catch(e){ /* segue com os valores padrão se o banco ainda não tiver config */ }
  render();
}
initApp();
</script>
